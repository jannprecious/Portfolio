<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 372 388" role="img" aria-labelledby="title desc">
  <title id="title">Food Menu Website preview</title>
  <desc id="desc">A refreshed browser-style preview of a food menu website featuring a warm hero banner, a plated meal illustration, and three featured dish cards.</desc>
  <defs>
    <linearGradient id="frame" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#4b4642"/>
      <stop offset="1" stop-color="#1f1d1b"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff1d8"/>
      <stop offset="0.55" stop-color="#ffd0a8"/>
      <stop offset="1" stop-color="#f38c55"/>
    </linearGradient>
    <linearGradient id="plate" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffefb"/>
      <stop offset="1" stop-color="#efe1d3"/>
    </linearGradient>
    <linearGradient id="salad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#8ad85b"/>
      <stop offset="1" stop-color="#2f8d2c"/>
    </linearGradient>
    <linearGradient id="cardAccent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffbf70"/>
      <stop offset="1" stop-color="#f38c55"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#33261d" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="372" height="388" rx="16" fill="url(#frame)"/>
  <rect x="8" y="8" width="356" height="372" rx="13" fill="#fffaf4" stroke="#69615c" stroke-width="1.4"/>

  <rect x="14" y="14" width="344" height="30" rx="8" fill="#262321"/>
  <circle cx="31" cy="29" r="5" fill="#ff7d6b"/>
  <circle cx="48" cy="29" r="5" fill="#f4bf4f"/>
  <circle cx="65" cy="29" r="5" fill="#68d36b"/>

  <rect x="20" y="54" width="332" height="40" rx="14" fill="#fff2e3"/>
  <rect x="30" y="63" width="96" height="22" rx="11" fill="#ef6f3d"/>
  <text x="49" y="78" fill="#281b14" font-family="Georgia, serif" font-size="16" font-weight="700">Food Menu</text>
  <text x="160" y="78" fill="#463a34" font-family="Arial, sans-serif" font-size="12" font-weight="700">Menu</text>
  <text x="206" y="78" fill="#463a34" font-family="Arial, sans-serif" font-size="12">About</text>
  <text x="251" y="78" fill="#463a34" font-family="Arial, sans-serif" font-size="12">Reviews</text>
  <rect x="294" y="62" width="48" height="24" rx="12" fill="#1f1f1f"/>
  <text x="304" y="78" fill="#fff7ef" font-family="Arial, sans-serif" font-size="11" font-weight="700">Order</text>

  <rect x="20" y="104" width="332" height="146" rx="20" fill="url(#hero)"/>
  <circle cx="294" cy="196" r="54" fill="#bd6c3f" opacity="0.18"/>
  <ellipse cx="286" cy="214" rx="44" ry="11" fill="#c16d3f" opacity="0.2"/>
  <circle cx="286" cy="186" r="48" fill="url(#plate)" filter="url(#shadow)"/>
  <circle cx="286" cy="186" r="35" fill="#fff6eb"/>
  <ellipse cx="286" cy="187" rx="18" ry="26" fill="#f3984f"/>
  <ellipse cx="271" cy="177" rx="13" ry="10" fill="#7fc94d"/>
  <ellipse cx="302" cy="176" rx="14" ry="11" fill="#5fa637"/>
  <ellipse cx="270" cy="197" rx="12" ry="9" fill="#93dc61"/>
  <ellipse cx="303" cy="198" rx="13" ry="10" fill="#76c04b"/>
  <ellipse cx="286" cy="188" rx="11" ry="16" fill="#f0743e"/>
  <circle cx="281" cy="182" r="3" fill="#fff1d2"/>
  <circle cx="292" cy="193" r="3" fill="#fff1d2"/>

  <text x="38" y="146" fill="#60321d" font-family="Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2">TODAY'S SPECIAL</text>
  <text x="38" y="176" fill="#2c1d15" font-family="Georgia, serif" font-size="26" font-weight="700">Fresh Meals</text>
  <text x="38" y="206" fill="#5f4b41" font-family="Arial, sans-serif" font-size="13">Colorful dishes made daily</text>
  <text x="38" y="224" fill="#5f4b41" font-family="Arial, sans-serif" font-size="13">for lunch and dinner orders.</text>
  <rect x="38" y="228" width="84" height="30" rx="15" fill="#2a211c"/>
  <text x="57" y="247" fill="#fff6ed" font-family="Arial, sans-serif" font-size="12" font-weight="700">View Menu</text>
  <rect x="126" y="228" width="72" height="30" rx="15" fill="#fff5eb" opacity="0.86"/>
  <text x="147" y="247" fill="#6d5245" font-family="Arial, sans-serif" font-size="12" font-weight="700">Book</text>

  <rect x="20" y="264" width="332" height="100" rx="22" fill="#fff6ed"/>
  <text x="34" y="289" fill="#3a2d27" font-family="Georgia, serif" font-size="18" font-weight="700">Featured Dishes</text>
  <text x="268" y="289" fill="#8f5d45" font-family="Arial, sans-serif" font-size="11" font-weight="700">4.9 rating</text>

  <rect x="32" y="302" width="93" height="48" rx="16" fill="#fffdf9" stroke="#f0dac8" stroke-width="1.2"/>
  <circle cx="56" cy="326" r="15" fill="url(#cardAccent)"/>
  <ellipse cx="56" cy="326" rx="8" ry="8" fill="#fff3de"/>
  <text x="79" y="322" fill="#332722" font-family="Arial, sans-serif" font-size="11" font-weight="700">Pasta</text>
  <text x="79" y="337" fill="#86695b" font-family="Arial, sans-serif" font-size="10">Creamy special</text>

  <rect x="139" y="302" width="93" height="48" rx="16" fill="#fffdf9" stroke="#f0dac8" stroke-width="1.2"/>
  <circle cx="163" cy="326" r="15" fill="#ef6f3d"/>
  <ellipse cx="163" cy="326" rx="8" ry="6" fill="#ffd7a5"/>
  <text x="186" y="322" fill="#332722" font-family="Arial, sans-serif" font-size="11" font-weight="700">Burger</text>
  <text x="186" y="337" fill="#86695b" font-family="Arial, sans-serif" font-size="10">Best seller</text>

  <rect x="246" y="302" width="93" height="48" rx="16" fill="#fffdf9" stroke="#f0dac8" stroke-width="1.2"/>
  <circle cx="270" cy="326" r="15" fill="url(#salad)"/>
  <ellipse cx="270" cy="326" rx="7" ry="7" fill="#d6f4c0"/>
  <text x="293" y="322" fill="#332722" font-family="Arial, sans-serif" font-size="11" font-weight="700">Salad</text>
  <text x="293" y="337" fill="#86695b" font-family="Arial, sans-serif" font-size="10">Fresh greens</text>
  <rect x="314" y="278" width="26" height="10" rx="5" fill="#ef6f3d"/>
</svg>
