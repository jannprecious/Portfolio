<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" role="img" aria-labelledby="title desc">
  <title id="title">Library Management System preview</title>
  <desc id="desc">A dark mobile console style preview showing the text menu of the Library Management System project.</desc>

  <defs>
    <linearGradient id="bezel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#3e3e40"/>
      <stop offset="0.2" stop-color="#161616"/>
      <stop offset="0.8" stop-color="#0d0d0d"/>
      <stop offset="1" stop-color="#3b3b3d"/>
    </linearGradient>
  </defs>

  <rect width="420" height="420" rx="38" fill="url(#bezel)"/>
  <rect x="10" y="10" width="400" height="400" rx="34" fill="#0b0b0b"/>
  <rect x="24" y="24" width="372" height="372" rx="28" fill="#020202"/>

  <rect x="148" y="28" width="124" height="8" rx="4" fill="#131313"/>
  <circle cx="280" cy="32" r="3.5" fill="#1e2b39"/>

  <g fill="#c7f1ae" font-family="Consolas, 'Courier New', monospace" font-size="22">
    <text x="38" y="94">Welcome to Library</text>
    <text x="38" y="122">Management System</text>

    <text x="38" y="176">1. Add Book</text>
    <text x="38" y="210">2. Borrow Book</text>
    <text x="38" y="244">3. Return Book</text>
    <text x="38" y="278">4. Exit</text>

    <text x="38" y="338">Enter your choice:</text>
  </g>
</svg>
