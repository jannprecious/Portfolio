<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" role="img" aria-labelledby="title desc">
  <title id="title">Notion project preview</title>
  <desc id="desc">A dark todo app interface with the heading Awesome Todos, an input field, and a Create Todo button.</desc>

  <defs>
    <pattern id="grid" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M8 12 C22 0 42 0 50 14 C58 28 42 48 24 50 C8 52 0 36 8 12 Z" fill="none" stroke="#2d2733" stroke-width="1.2" opacity="0.6"/>
      <path d="M16 18 C26 10 38 10 44 20 C50 30 40 42 28 44 C16 46 10 34 16 18 Z" fill="none" stroke="#2d2733" stroke-width="1" opacity="0.45"/>
    </pattern>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1f1a22"/>
      <stop offset="1" stop-color="#161219"/>
    </linearGradient>
  </defs>

  <rect width="420" height="420" fill="url(#bg)"/>
  <rect width="420" height="420" fill="url(#grid)"/>

  <text x="210" y="84" fill="#ffffff" font-family="Arial, sans-serif" font-size="34" font-weight="700" text-anchor="middle">Awesome Todos</text>

  <rect x="24" y="118" width="308" height="36" rx="3" fill="#f3f3f3"/>
  <text x="34" y="142" fill="#7c7c7c" font-family="Arial, sans-serif" font-size="14">Enter a new todo...</text>

  <rect x="338" y="118" width="58" height="36" rx="2" fill="#ffffff"/>
  <text x="367" y="142" fill="#111111" font-family="Arial, sans-serif" font-size="11.5" font-weight="600" text-anchor="middle">Create Todo</text>
</svg>
