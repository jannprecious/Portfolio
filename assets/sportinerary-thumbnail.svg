<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" role="img" aria-labelledby="title desc">
  <title id="title">Sportinerary login preview</title>
  <desc id="desc">A dark login screen for the Sportinerary app with a green geometric logo, title, tagline, and username and password fields.</desc>

  <defs>
    <linearGradient id="bezel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#5c5c5e"/>
      <stop offset="0.16" stop-color="#171717"/>
      <stop offset="0.84" stop-color="#0b0b0b"/>
      <stop offset="1" stop-color="#454547"/>
    </linearGradient>
    <linearGradient id="logoGreen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#7dff2d"/>
      <stop offset="1" stop-color="#2baa0a"/>
    </linearGradient>
  </defs>

  <rect width="420" height="420" rx="44" fill="url(#bezel)"/>
  <rect x="8" y="8" width="404" height="404" rx="38" fill="#070707"/>
  <rect x="20" y="20" width="380" height="380" rx="30" fill="#000000"/>

  <rect x="154" y="22" width="112" height="8" rx="4" fill="#141414"/>
  <circle cx="278" cy="26" r="3.5" fill="#1a2330"/>

  <g fill="url(#logoGreen)">
    <polygon points="210,70 242,88 210,106"/>
    <polygon points="210,108 242,126 210,144"/>
    <polygon points="178,88 210,106 178,124"/>
    <polygon points="178,52 210,70 178,88"/>
  </g>

  <text x="210" y="190" fill="#59ef22" font-family="Georgia, serif" font-size="32" font-weight="700" text-anchor="middle">SPORTINERARY</text>
  <text x="210" y="209" fill="#beb9b2" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">KNOW THE GAME</text>

  <rect x="140" y="196" width="140" height="12" fill="#2a0e08" opacity="0.85"/>

  <g fill="#e5e5e5" font-family="Arial, sans-serif" font-size="14">
    <text x="58" y="258">Username</text>
    <text x="58" y="315">Password</text>
  </g>

  <line x1="58" y1="275" x2="338" y2="275" stroke="#dadada" stroke-width="1.5"/>
  <line x1="58" y1="332" x2="338" y2="332" stroke="#58ef20" stroke-width="2"/>
</svg>
